name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy via Local Sync
        run: |
          cd /home/buddy/ricebookkeeping
          # 強制清理所有未追蹤檔案，確保環境乾淨
          git clean -fd
          # 強制拉取遠端最新分支並重置
          git fetch origin main
          git reset --hard origin/main